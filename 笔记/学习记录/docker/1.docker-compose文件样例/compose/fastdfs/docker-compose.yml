version: '3'
services:
  # FastDFS Tracker服务
  tracker:
    image: delron/fastdfs:latest
    container_name: fastdfs_tracker
    networks:
      - liurl_net
    volumes:
      - tracker_data:/var/fdfs
    ports:
      - "22122:22122"
    command: tracker
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  # FastDFS Storage服务
  storage:
    image: delron/fastdfs:latest
    container_name: fastdfs_storage
    networks:
      - liurl_net
    volumes:
      - storage_data:/var/fdfs
    ports:
      - "23000:23000"
      - "8888:8888"
    environment:
      - TRACKER_SERVER=tracker:22122
      - TZ=Asia/Shanghai
    command: storage
    depends_on:
      - tracker
    restart: unless-stopped

# 定义命名卷
volumes:
  tracker_data:
    name: fastdfs_tracker_data
  storage_data:
    name: fastdfs_storage_data

networks:
  liurl_net:  # 网络名
    name: liurl_net
    driver: bridge
